<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lillian & Bruno 💍</title>

  <link rel="stylesheet" href="style.css">

  <!-- Fonte elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelope-screen">
  <div class="envelope">
    <img src="envelope.png" alt="Envelope">
    <p>Toque para abrir</p>
  </div>
</div>

<!-- LIVRO -->
<div id="book" class="swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide page">
      <h1>Lillian & Bruno</h1>
      <p class="subtitle">Convidam para celebrar o amor</p>
    </div>

    <div class="swiper-slide page">
      <h2>Data</h2>
      <p>22 de Agosto de 2026</p>
      <p>às 17h</p>
    </div>

    <div class="swiper-slide page">
      <h2>Local</h2>
      <p>Chácara Allan'De Eventos</p>
    </div>

    <div class="swiper-slide page">
      <h2>Mensagem</h2>
      <p>Será uma honra compartilhar esse momento especial com você.</p>
    </div>

    <div class="swiper-slide page">
      <h2>Esperamos por você</h2>
      <p>Com carinho,</p>
      <p><strong>Lillian & Bruno</strong></p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
